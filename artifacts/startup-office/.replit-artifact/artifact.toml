kind = "web"
previewPath = "/"
title = "Living AI Startup Office"
version = "1.0.0"
id = "artifacts/startup-office"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25011

[services.development]
run = "pnpm --filter @workspace/startup-office run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/startup-office", "run", "build" ]
publicDir = "artifacts/startup-office/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25011"
BASE_PATH = "/"
